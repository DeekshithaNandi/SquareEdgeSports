spring.application.name=SquareEdgeSports
server.port=${PORT:8080}

# spring.datasource.url=jdbc:mysql://${MYSQLHOST:${MYSQL_ADDON_HOST}}:${MYSQLPORT:${MYSQL_ADDON_PORT}}/${MYSQLDATABASE:${MYSQL_ADDON_DB}}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=${MYSQLUSER:${MYSQL_ADDON_USER}}
# spring.datasource.password=${MYSQLPASSWORD:${MYSQL_ADDON_PASSWORD}}
# âś… Fix â€” use single var names, set these on Render
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jackson.time-zone=Asia/Kolkata

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.host=${MAIL_HOST}

spring.mail.port=${MAIL_PORT}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

app.email.enabled=true
app.email.from=${MAIL_FROM}
brevo.api.key=${BREVO_API_KEY}
# app.frontend.url=${APP_FRONTEND_URL:http://localhost:5174}
# âś… Remove the fallback â€” force it to fail loudly if not set
app.frontend.url=${APP_FRONTEND_URL}

# app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
# âś… Fix
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

app.upload.dir=uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.web.resources.static-locations=classpath:/static/,file:./

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
